}

.field input, .field select {

const $ = id => document.getElementById(id);
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
};

function makeField(label, value, onChange, opts={}) {
  const wrap = h('div', {className:'field'});
  if (opts.half) wrap.style.flex = '1 1 140px';
  wrap.appendChild(h('label', null, label));
  const inp = h('input', { type: opts.type||'text', value: value||'', placeholder: opts.ph||'' });
  inp.addEventListener('input', e => onChange(e.target.value));
  wrap.appendChild(inp);
  return wrap;
}

function makeSelect(label, value, options, onChange) {
  const wrap = h('div', {className:'field'});
  const lbl = h('label', null, label);
  const sel = h('select');
  options.forEach(o => { const op = h('option', {value:o}, o); if(o===value) op.selected=true; sel.appendChild(op); });
  sel.addEventListener('change', e => onChange(e.target.value));
  wrap.appendChild(lbl);
  wrap.appendChild(sel);
  return wrap;
}

function makeCheck(label, checked, onChange, compact) {
  const el = h('div', {className: 'chk' + (checked?' on':'') + (compact?' compact':'')});
  el.appendChild(h('span', {className:'chk-mark'}, checked?'☑':'☐'));
  el.appendChild(h('span', null, label));
  el.addEventListener('click', () => { onChange(!checked); render(); });
  return el;
}

function generateReport() {
  const pick = (obj) => Object.entries(obj||{}).filter(([,v])=>v).map(([k])=>k);
  const eqList = pick(fireEquip);
  const st = pick(evac.stairs); const fac = pick(evac.fac);
  const fc = pick(evac.fc); const fe = pick(evac.fe);
  const sc = pick(evac.sc); const fin = pick(evac.fin);

  let r = "";
  r += "═══════════════════════════════════════════\n";
  r += `    [${building.name||'○○아파트'}] 소방계획서\n`;
  r += `    작성일자: ${new Date().toLocaleDateString("ko-KR")}\n`;
  r += "═══════════════════════════════════════════\n\n";
  r += "┌──────────────────────────────────────┐\n";
  r += "│ 결재 │소방안전관리자│ 관리소장 │입주자대표│\n";
  r += "│      │             │          │          │\n";
  r += "└──────────────────────────────────────┘\n\n";

  r += "━━━ 서식 1.1 건축물 일반현황 ━━━\n\n";
  r += `명    칭: ${building.name}\n`;
  r += `도로명주소: ${building.address}\n`;
  r += `대표자: ${building.rep} (${building.repTel})\n`;
  r += `소방안전관리자: ${building.sm} (${building.smTel})\n\n`;
  r += `[시설현황]\n`;
  r += `대상물 급수: ${building.grade}  |  주용도: ${building.use}\n`;
  r += `사용승인일: ${building.approval}\n`;
  r += `연면적: ${building.area}㎡  |  건축면적: ${building.bldgArea}㎡\n`;
  r += `층수: 지하 ${building.uf}층 / 지상 ${building.af}층\n`;
  r += `높이: ${building.height}m  |  구조: ${building.structure}  |  지붕: ${building.roof}\n`;
  const el = []; if(building.elev.passenger)el.push("승용"); if(building.elev.emergency)el.push("비상용"); if(building.elev.evacuation)el.push("피난용");
  r += `승강기: ${el.length?el.join(", "):"없음"}\n`;
  const pk = []; if(building.park.indoor)pk.push("옥내"); if(building.park.outdoor)pk.push("옥외"); if(building.park.ev)pk.push("전기차충전소");
  r += `주차장: ${pk.length?pk.join(", "):"없음"}\n`;
  const sArr=[]; if(building.stair.special)sArr.push("특별피난계단"); if(building.stair.direct)sArr.push("직통계단"); if(building.stair.evac)sArr.push("피난계단"); if(building.stair.outdoor)sArr.push("옥외계단");
  r += `계단: ${sArr.length?sArr.join(", "):"없음"}\n\n`;
  r += `[운영현황]\n`;
  r += `근무인원: ${building.workers}명 | 거주인원: ${building.residents}명 | 최대수용: ${building.maxCap}명\n`;
  if (building.insCompany) r += `화재보험: ${building.insCompany} (${building.insPeriod}) ${building.insAmount}\n`;

  r += "\n\n━━━ 서식 1.2.2 공동주택 세부현황 ━━━\n\n";
  dongs.forEach(d => {
    r += `${d.name}\n`;
    r += `  층수: 지하${d.uf}층/지상${d.af}층 | 연면적: ${d.area}㎡ | 높이: ${d.height}m\n`;
    r += `  라인수: ${d.lines} | 세대수: ${d.units}세대 (거주: ${d.res}명)\n`;
    r += `  계단: ${d.stType} ${d.stCnt}개소\n`;
    r += `  승강기: 승용${d.eP||0}대, 비상용${d.eE||0}대, 피난용${d.eV||0}대\n`;

  });

  r += "\n\n━━━ 서식 1.4 소방시설 현황 ━━━\n\n";
  r += `■ 대상명: ${building.name}\n\n`;
  Object.entries(FIRE_EQUIPMENT).forEach(([cat,items])=>{
    r += `[${cat}]\n`;
    items.forEach(i => r += `  ${fireEquip[i]?"☑":"☐"} ${i}\n`);

  });

  r += "\n━━━ 서식 1.5 피난·방화시설 현황 ━━━\n\n";

  r += `[방화구획] ${evac.fcExists?"해당":"미해당"}\n`;
  if(evac.fcExists){ r += `  기준: ${fc.length?fc.join(", "):"없음"}\n  설비: ${fe.length?fe.join(", "):"없음"}\n`; }
  r += `\n[제연구획] ${evac.scExists?"해당":"미해당"}\n`;
  if(evac.scExists) r += `  구역: ${sc.length?sc.join(", "):"없음"}\n`;
  r += `\n[방염] ${evac.flamExists?"해당":"미해당"}\n`;
  if(evac.flamExists) r += `  물품: ${evac.flamItems}\n  위치: ${evac.flamLoc}\n  성적서: ${evac.flamCert}\n`;
  r += `\n[내부마감재료]: ${fin.length?fin.join(", "):"없음"}\n`;

  r += "\n\n═══════════════════════════════════════════\n";
  r += "  NOUnsafe — AI 기반 안전관리 플랫폼\n";
  r += "  https://cafe.naver.com/114er\n";
  r += "  피드백: " + GOOGLE_FORM_URL + "\n";
  r += "═══════════════════════════════════════════\n";
  return r;
}

function renderStep5() {
  const el = h('div');
  el.appendChild(h('div',{className:'section-title'},'📋 소방계획서 미리보기'));
  el.appendChild(h('div',{className:'section-desc'},'작성된 내용을 확인하고 다운로드하세요'));

  // Stats
  const eqCnt = Object.values(fireEquip).filter(v=>v).length;
  const totalUnits = dongs.reduce((s,d)=>s+(parseInt(d.units)||0),0);
  const sc = h('div',{className:'card',style:{background:'var(--success-bg)',borderColor:'#A5D6A7'}});
  const sr = h('div',{className:'stats-row'});
  [{l:"건축물",v:building.name||"-"},{l:"동 수",v:dongs.length+"개동"},{l:"소방시설",v:eqCnt+"종"},{l:"총 세대",v:totalUnits+"세대"}].forEach(s=>{
    const st=h('div',{className:'stat'});
    st.appendChild(h('div',{className:'stat-label'},s.l));
    st.appendChild(h('div',{className:'stat-value'},s.v));
    sr.appendChild(st);
  });
  sc.appendChild(sr);
  el.appendChild(sc);

  // Preview
  const report = generateReport();
  el.appendChild(h('div',{className:'preview-box'}, report));

  // Download button
  const dlBtn = h('button',{className:'btn btn-success',style:{width:'100%',marginTop:'16px'}},'📥 텍스트 파일 다운로드');
  dlBtn.addEventListener('click', ()=>{
    const blob = new Blob(["\uFEFF"+report], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${building.name||'공동주택'}_소방계획서_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  });
  el.appendChild(dlBtn);

  // Feedback CTA
  const fb = h('div',{className:'feedback-banner',style:{marginTop:'20px'}});
  fb.appendChild(h('h3',null,'🙏 작성 완료! 사용 경험은 어떠셨나요?'));
  fb.appendChild(h('p',null,'1분 설문으로 의견을 남겨주시면\n더 나은 도구를 만드는 데 큰 힘이 됩니다'));
  const fbBtn = h('a',{className:'feedback-btn',href:GOOGLE_FORM_URL,target:'_blank'},'📝 피드백 설문 참여하기');
  fb.appendChild(fbBtn);
  el.appendChild(fb);

  // Next features
  el.appendChild(h('div',{className:'info-box blue',style:{marginTop:'16px'}},
    h('div',null,
      h('strong',null,'💡 다음 버전 예정 기능'),h('br'),
      '• AI 기반 화재취약장소 자동 분석',h('br'),
      '• 자위소방대 편성표 자동 생성 (서식 2장)',h('br'),
      '• 피난계획 자동 작성 (서식 3장)',h('br'),
      '• HWP/DOCX 포맷 출력 지원',h('br'),h('br'),
      '의견이나 개선사항은 카페 댓글 또는 설문으로 남겨주세요!'
    )
  ));
  return el;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
const renderers = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5];

function canProceed() {
  if (currentStep===1) return building.name && building.address;
  if (currentStep===2) return dongs.length>0 && dongs[0].name;
  return true;
}

function renderStepper() {
  const stepper = $('stepper');
  stepper.innerHTML = '';
  STEPS.forEach((s,i)=>{
    const cls = 'step-item' + (currentStep===i?' active':'') + (currentStep>i?' done':'');
    const si = h('div',{className:cls});
    si.appendChild(h('span',{className:'step-icon'}, currentStep>i?'✅':s.icon));
    si.appendChild(h('span',{className:'step-label'}, s.label));
    if (i<=currentStep) si.addEventListener('click', ()=>{ currentStep=i; render(); });
    stepper.appendChild(si);
  });
}

function renderNav() {
  const nav = $('nav');
  nav.innerHTML = '';
  if (currentStep>0) {
    const pb = h('button',{className:'btn btn-secondary'},'← 이전');
    pb.addEventListener('click', ()=>{ currentStep--; render(); });
    nav.appendChild(pb);
  }
  if (currentStep<STEPS.length-1) {
    const nb = h('button',{className:'btn btn-primary'}, currentStep===0?'작성 시작하기 →':'다음 →');
    if(!canProceed()) nb.disabled = true;
    nb.addEventListener('click', ()=>{ if(canProceed()){currentStep++; render();} });
    nav.appendChild(nb);
  }
}

function render() {
  const content = $('content');
  content.innerHTML = '';
  content.appendChild(renderers[currentStep]());
  renderStepper();
  renderNav();
  window.scrollTo({top:0, behavior:'smooth'});
}

// Init
render();
</script>
